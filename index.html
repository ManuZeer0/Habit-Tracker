<html lang="it"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HabitFlow - Habit Tracker</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons per icone bellissime -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* =========================================================================
           CONFIGURAZIONE COLORI (Modifica questi valori Hex per cambiare il tema!)
           ========================================================================= */
        :root {
            --primary: #6366f1;       /* Viola/Indigo principale */
            --primary-dark: #4f46e5;  /* Viola scuro per i click */
            --bg-app: #f8fafc;        /* Sfondo applicazione (Slate 50) */
            --card-bg: #ffffff;       /* Sfondo dei box e post-it */
            
            --completed: #10b981;     /* Verde: Task 100% completati */
            --partial: #f59e0b;       /* Giallo: Task completati parzialmente (>0%) */
            --freeze: #38bdf8;        /* Azzurro Ghiaccio: Streak Freeze utilizzato */
            --uncompleted: #e2e8f0;   /* Grigio: Nessun task completato */
        }

        body {
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-app);
        }
        
        /* Utility per applicare i colori dinamici tramite variabili CSS */
        .bg-primary { background-color: var(--primary); }
        .text-primary { color: var(--primary); }
        .border-primary { border-color: var(--primary); }
        
        .bg-card-custom { background-color: var(--card-bg); }
    </style>
</head>
<body class="text-slate-800">

    <div class="min-h-screen flex flex-col max-w-md mx-auto shadow-2xl border-x border-slate-100 bg-[var(--bg-app)]">
        
        <!-- --- HEADER --- -->
        <header class="p-4 flex items-center justify-between border-b border-slate-100 sticky top-0 z-10 bg-white">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg flex items-center justify-center text-white bg-primary">
                    <i data-lucide="check-square" class="w-5 h-5"></i>
                </div>
                <span class="font-bold text-xl tracking-tight">HabitFlow</span>
            </div>
            
            <!-- Widget Streak e Freeze -->
            <div class="flex items-center gap-2">
                <div class="flex items-center gap-1 bg-amber-50 text-amber-700 px-3 py-1.5 rounded-full border border-amber-100 text-sm font-bold shadow-sm">
                    <span>🔥</span> <span id="header-streak">0</span>
                </div>
                <div class="flex items-center gap-1 bg-sky-50 text-sky-700 px-3 py-1.5 rounded-full border border-sky-100 text-sm font-bold shadow-sm" title="Freeze rimasti per questo mese">
                    <span>❄️</span> <span id="header-freezes">2</span>
                </div>
            </div>
        </header>

        <!-- --- CONTENUTO ATTIVO --- -->
        <main id="main-content" class="flex-1 overflow-y-auto p-4 pb-24">
            <!-- Il contenuto dinamico delle schermate verrà inserito qui da JS -->
        </main>

        <!-- --- NAVBAR FOOTER (Mobile Sticky) --- -->
        <nav class="border-t border-slate-100 p-3 flex justify-around items-center fixed bottom-0 left-0 right-0 max-w-md mx-auto z-10 bg-white">
            <button onclick="changeTab('oggi')" id="btn-tab-oggi" class="flex flex-col items-center gap-1 p-2 rounded-xl transition-all text-slate-400">
                <i data-lucide="check-square" class="w-6 h-6"></i>
                <span class="text-[10px] font-bold">Oggi</span>
            </button>
            
            <button onclick="changeTab('storico')" id="btn-tab-storico" class="flex flex-col items-center gap-1 p-2 rounded-xl transition-all text-slate-400">
                <i data-lucide="calendar" class="w-6 h-6"></i>
                <span class="text-[10px] font-bold">Storico</span>
            </button>
            
            <button onclick="changeTab('goals')" id="btn-tab-goals" class="flex flex-col items-center gap-1 p-2 rounded-xl transition-all text-slate-400">
                <i data-lucide="plus-circle" class="w-6 h-6"></i>
                <span class="text-[10px] font-bold">Gestisci</span>
            </button>
        </nav>

    </div>

    <!-- --- LOGICA JAVASCRIPT --- -->
    <script>
        // --- STATO STATICO GLOBALE ---
        let state = {
            currentTab: 'oggi',
            tasks: [],
            history: {}, // "YYYY-MM-DD": { mood: '', note: '', completions: { taskId: valore }, freezeUsed: false }
            streak: 0,
            freezesRemaining: 2,
            lastCheckDate: '',
            
            // Stato temporaneo per la creazione di un nuovo goal
            newGoal: {
                name: '',
                type: 'binary',
                cadence: 'daily',
                selectedDays: [1,2,3,4,5] // Lun-Ven
            },
            selectedHistoryDay: null // Giorno del calendario selezionato per i dettagli
        };

        // --- HELPER DI DATA LOCALE YYYY-MM-DD ---
        function getLocalDateString(date) {
            const offset = date.getTimezoneOffset();
            const localDate = new Date(date.getTime() - (offset * 60 * 1000));
            return localDate.toISOString().split('T')[0];
        }

        // --- CARICAMENTO E SALVATAGGIO IN LOCALSTORAGE ---
        function loadState() {
            const storedTasks = localStorage.getItem('ht_tasks');
            const storedHistory = localStorage.getItem('ht_history');
            const storedStreak = localStorage.getItem('ht_streak');
            const storedFreezes = localStorage.getItem('ht_freezes');
            const storedLastCheck = localStorage.getItem('ht_last_check');

            if (storedTasks) state.tasks = JSON.parse(storedTasks);
            if (storedHistory) state.history = JSON.parse(storedHistory);
            if (storedStreak) state.streak = parseInt(storedStreak) || 0;
            if (storedFreezes) state.freezesRemaining = parseInt(storedFreezes) || 2;
            if (storedLastCheck) state.lastCheckDate = storedLastCheck;

            // Avvia sincronizzazione di Streak & Freeze
            syncStreakAndFreeze();
        }

        function saveState() {
            localStorage.setItem('ht_tasks', JSON.stringify(state.tasks));
            localStorage.setItem('ht_history', JSON.stringify(state.history));
            localStorage.setItem('ht_streak', state.streak.toString());
            localStorage.setItem('ht_freezes', state.freezesRemaining.toString());
            localStorage.setItem('ht_last_check', state.lastCheckDate);
            
            // Aggiorna l'header
            document.getElementById('header-streak').innerText = state.streak;
            document.getElementById('header-freezes').innerText = state.freezesRemaining;
        }

        // --- CALCOLO AUTOMATICO DELLO STREAK E DELLO STREAK FREEZE ---
        function syncStreakAndFreeze() {
            const today = new Date();
            const todayStr = getLocalDateString(today);

            if (!state.lastCheckDate) {
                state.lastCheckDate = todayStr;
                saveState();
                return;
            }

            if (state.lastCheckDate === todayStr) {
                saveState();
                return; // Già verificato oggi
            }

            const lastCheckDateObj = new Date(state.lastCheckDate);
            
            // Reset dei freeze se siamo in un mese nuovo
            if (today.getMonth() !== lastCheckDateObj.getMonth() || today.getFullYear() !== lastCheckDateObj.getFullYear()) {
                state.freezesRemaining = 2;
            }

            // Controlla i giorni passati saltati
            let checkPointer = new Date(lastCheckDateObj);
            checkPointer.setDate(checkPointer.getDate() + 1); // Giorno dopo l'ultimo check

            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            const yesterdayStr = getLocalDateString(yesterday);

            while (getLocalDateString(checkPointer) <= yesterdayStr) {
                const checkDayStr = getLocalDateString(checkPointer);
                const dayOfWeek = checkPointer.getDay() === 0 ? 7 : checkPointer.getDay(); // 1=Lun, 7=Dom

                // Task attivi per quel giorno passato
                const tasksForDay = state.tasks.filter(t => 
                    t.cadence === 'daily' || (t.cadence === 'weekly' && t.selectedDays.includes(dayOfWeek))
                );

                if (tasksForDay.length > 0) {
                    const dayEntry = state.history[checkDayStr] || { completions: {} };
                    const completions = dayEntry.completions || {};
                    const hasDoneAtLeastOne = Object.keys(completions).some(taskId => completions[taskId] > 0);

                    if (!hasDoneAtLeastOne) {
                        // Salta il giorno: proviamo lo Streak Freeze
                        if (state.freezesRemaining > 0) {
                            state.freezesRemaining--;
                            state.history[checkDayStr] = {
                                ...dayEntry,
                                freezeUsed: true,
                                mood: '❄️',
                                note: 'Giorno congelato automaticamente!',
                                completions: completions
                            };
                        } else {
                            // Nessun freeze disponibile: streak persa
                            state.streak = 0;
                        }
                    }
                }
                checkPointer.setDate(checkPointer.getDate() + 1);
            }

            state.lastCheckDate = todayStr;
            saveState();
        }

        // --- ROUTING / CAMBIO TAB ---
        function changeTab(tabName) {
            state.currentTab = tabName;
            
            // Aggiorna classi bottoni footer
            ['oggi', 'storico', 'goals'].forEach(tab => {
                const btn = document.getElementById(`btn-tab-${tab}`);
                if (tab === tabName) {
                    btn.style.color = 'var(--primary)';
                    btn.classList.remove('text-slate-400');
                } else {
                    btn.style.color = '';
                    btn.classList.add('text-slate-400');
                }
            });

            render();
        }

        // --- CONTROLLER EVENTI SCHERMATA OGGI ---
        function setMood(emoji) {
            const todayStr = getLocalDateString(new Date());
            if (!state.history[todayStr]) state.history[todayStr] = { mood: '', note: '', completions: {}, freezeUsed: false };
            state.history[todayStr].mood = emoji;
            saveState();
            render();
        }

        function updateNote(text) {
            const todayStr = getLocalDateString(new Date());
            if (!state.history[todayStr]) state.history[todayStr] = { mood: '', note: '', completions: {}, freezeUsed: false };
            state.history[todayStr].note = text;
            saveState();
        }

        function toggleBinaryTask(taskId) {
            const todayStr = getLocalDateString(new Date());
            if (!state.history[todayStr]) state.history[todayStr] = { mood: '', note: '', completions: {}, freezeUsed: false };
            
            const completions = state.history[todayStr].completions;
            const prevVal = completions[taskId] || 0;
            const newVal = prevVal === 1 ? 0 : 1;
            completions[taskId] = newVal;

            // Ricalcola lo streak in tempo reale
            const wasActiveToday = Object.values(completions).some(v => v > 0 && v !== newVal);
            const isActiveNow = Object.values(completions).some(v => v > 0);

            if (!wasActiveToday && isActiveNow) {
                state.streak++;
            } else if (wasActiveToday && !isActiveNow) {
                state.streak = Math.max(0, state.streak - 1);
            }

            saveState();
            render();
        }

        function updateProgressiveTask(taskId, val) {
            const todayStr = getLocalDateString(new Date());
            if (!state.history[todayStr]) state.history[todayStr] = { mood: '', note: '', completions: {}, freezeUsed: false };
            
            const completions = state.history[todayStr].completions;
            const prevVal = completions[taskId] || 0;
            completions[taskId] = parseInt(val);

            // Ricalcola lo streak in tempo reale
            const wasActiveToday = Object.keys(completions).some(id => id !== taskId && completions[id] > 0) || prevVal > 0;
            const isActiveNow = Object.values(completions).some(v => v > 0);

            if (!wasActiveToday && isActiveNow) {
                state.streak++;
            } else if (wasActiveToday && !isActiveNow) {
                state.streak = Math.max(0, state.streak - 1);
            }

            saveState();
            // Aggiorna solo la percentuale visibile per evitare di rigenerare tutto l'HTML durante lo scorrimento
            document.getElementById(`percentage-label-${taskId}`).innerText = val + '%';
        }

        // --- CONTROLLER EVENTI GESTIONE GOALS ---
        function setGoalField(field, value) {
            state.newGoal[field] = value;
            render();
        }

        function toggleGoalDay(dayNum) {
            let days = [...state.newGoal.selectedDays];
            if (days.includes(dayNum)) {
                days = days.filter(d => d !== dayNum);
            } else {
                days.push(dayNum);
            }
            state.newGoal.selectedDays = days.sort();
            render();
        }

        function createGoal() {
            if (!state.newGoal.name.trim()) return;
            
            const goal = {
                id: Date.now().toString(),
                name: state.newGoal.name,
                type: state.newGoal.type,
                cadence: state.newGoal.cadence,
                selectedDays: state.newGoal.cadence === 'weekly' ? state.newGoal.selectedDays : [1,2,3,4,5,6,7]
            };

            state.tasks.push(goal);
            
            // Reset form
            state.newGoal = { name: '', type: 'binary', cadence: 'daily', selectedDays: [1,2,3,4,5] };
            saveState();
            changeTab('oggi');
        }

        function deleteGoal(id) {
            if (confirm("Eliminare definitivamente questo Habit?")) {
                state.tasks = state.tasks.filter(t => t.id !== id);
                saveState();
                render();
            }
        }

        // --- RENDERIZZA DETTAGLIO GIORNO CALENDARIO ---
        function showDayDetail(dateStr) {
            const dateObj = new Date(dateStr);
            const dayOfWeek = dateObj.getDay() === 0 ? 7 : dateObj.getDay();
            
            const dayTasks = state.tasks.filter(t => 
                t.cadence === 'daily' || (t.cadence === 'weekly' && t.selectedDays.includes(dayOfWeek))
            );

            state.selectedHistoryDay = {
                dateStr: dateStr,
                dayTasks: dayTasks,
                metadata: state.history[dateStr] || null
            };
            render();
        }

        // --- CALCOLO STATO GIORNO CALENDARIO ---
        function getDayStatus(dateStr, dayTasks) {
            const dayEntry = state.history[dateStr];
            if (!dayEntry) return 'none';
            if (dayEntry.freezeUsed) return 'freeze';
            if (dayTasks.length === 0) return 'none';

            const completions = dayEntry.completions || {};
            const maxPossible = dayTasks.length * 100;
            const actualProgress = dayTasks.reduce((acc, task) => {
                const comp = completions[task.id] || 0;
                return acc + (task.type === 'binary' ? comp * 100 : comp);
            }, 0);

            if (actualProgress === 0) return 'none';
            if (actualProgress >= maxPossible) return 'completed';
            return 'partial';
        }

        // --- MOTORE DI RENDERING DELL'INTERFACCIA ---
        function render() {
            const container = document.getElementById('main-content');
            
            if (state.currentTab === 'oggi') {
                const todayStr = getLocalDateString(new Date());
                const dayOfWeek = new Date().getDay() === 0 ? 7 : new Date().getDay();
                const todayTasks = state.tasks.filter(t => 
                    t.cadence === 'daily' || (t.cadence === 'weekly' && t.selectedDays.includes(dayOfWeek))
                );
                const todayMetadata = state.history[todayStr] || { mood: '', note: '', completions: {}, freezeUsed: false };

                let tasksHTML = '';
                if (todayTasks.length === 0) {
                    tasksHTML = `
                        <div class="text-center p-8 rounded-2xl border-2 border-dashed border-slate-200 text-slate-400 bg-white">
                            <i data-lucide="calendar-days" class="w-8 h-8 mx-auto mb-2 text-slate-300"></i>
                            <p class="font-medium text-sm">Nessun task programmato per oggi.</p>
                            <button onclick="changeTab('goals')" class="text-xs mt-2 underline text-primary font-bold">Crea un nuovo Habit</button>
                        </div>
                    `;
                } else {
                    todayTasks.forEach(task => {
                        const val = todayMetadata.completions?.[task.id] || 0;
                        const isCompleted = val > 0;
                        
                        let inputWidget = '';
                        if (task.type === 'binary') {
                            const isCheck = val === 1;
                            inputWidget = `
                                <button onclick="toggleBinaryTask('${task.id}')" class="w-full flex items-center justify-between p-3 rounded-xl border transition-all active:scale-[0.99]" 
                                    style="border-color: ${isCheck ? 'var(--completed)' : '#cbd5e1'}; background-color: ${isCheck ? 'rgba(16, 185, 129, 0.05)' : 'transparent'}">
                                    <span class="text-sm font-semibold" style="color: ${isCheck ? 'var(--completed)' : '#64748b'}">
                                        ${isCheck ? 'Completato!' : 'Segna come completato'}
                                    </span>
                                    <div class="w-6 h-6 rounded-full border-2 flex items-center justify-center transition-all" 
                                        style="border-color: ${isCheck ? 'var(--completed)' : '#cbd5e1'}; background-color: ${isCheck ? 'var(--completed)' : 'transparent'}">
                                        ${isCheck ? '<i data-lucide="check" class="w-4 h-4 text-white"></i>' : ''}
                                    </div>
                                </button>
                            `;
                        } else {
                            inputWidget = `
                                <div class="space-y-2">
                                    <div class="flex justify-between items-center text-xs font-bold ${isCompleted ? 'text-primary' : 'text-slate-400'}">
                                        <span>Avanzamento</span>
                                        <span id="percentage-label-${task.id}">${val}%</span>
                                    </div>
                                    <input type="range" min="0" max="100" step="5" value="${val}" 
                                        oninput="updateProgressiveTask('${task.id}', this.value)" 
                                        class="w-full h-2 rounded-lg bg-slate-100 appearance-none cursor-pointer accent-indigo-500" />
                                </div>
                            `;
                        }

                        tasksHTML += `
                            <div class="rounded-2xl p-4 shadow-sm border border-slate-100 bg-white flex flex-col gap-3">
                                <div class="flex items-center justify-between">
                                    <span class="font-bold text-slate-800 text-base">${task.name}</span>
                                    <span class="text-[9px] uppercase font-extrabold tracking-wider px-2.5 py-1 rounded-full bg-slate-100 text-slate-500">
                                        ${task.type === 'binary' ? 'Sì/No' : 'Progressivo'}
                                    </span>
                                </div>
                                ${inputWidget}
                            </div>
                        `;
                    });
                }

                container.innerHTML = `
                    <div class="space-y-6">
                        <!-- Post-it & Mood Section -->
                        <div class="rounded-2xl p-5 shadow-sm border border-slate-100 relative overflow-hidden bg-white">
                            <div class="absolute top-0 left-0 w-full h-1.5 bg-primary"></div>
                            <h3 class="font-extrabold text-base text-slate-700 mb-3">Come va la giornata oggi?</h3>
                            
                            <!-- Emojis -->
                            <div class="flex justify-between gap-1 mb-4">
                                ${['😭', '😔', '😐', '😊', '🤩'].map(emoji => {
                                    const isSelected = todayMetadata.mood === emoji;
                                    return `
                                        <button onclick="setMood('${emoji}')" class="text-3xl p-2 rounded-xl transition-transform active:scale-95 border-2 ${isSelected ? 'bg-indigo-50 border-indigo-200 scale-110' : 'border-transparent'}">
                                            ${emoji}
                                        </button>
                                    `;
                                }).join('')}
                            </div>

                            <!-- Post-it Note -->
                            <textarea oninput="updateNote(this.value)" placeholder="Scrivi un post-it su questa giornata..." rows="2" 
                                class="w-full p-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 text-sm bg-amber-50/20 placeholder-slate-400"
                                style="border-style: dashed;">${todayMetadata.note || ''}</textarea>
                        </div>

                        <!-- Lista Task -->
                        <div class="space-y-3">
                            <div class="flex justify-between items-center">
                                <h2 class="text-lg font-black text-slate-800 tracking-tight">I TUOI GOALS OGGI</h2>
                                <span class="text-[11px] uppercase tracking-wider font-bold text-slate-400 bg-slate-100 px-2 py-1 rounded-md">
                                    ${new Date().toLocaleDateString('it-IT', { weekday: 'short', day: 'numeric', month: 'short' })}
                                </span>
                            </div>
                            ${tasksHTML}
                        </div>
                    </div>
                `;
            }

            else if (state.currentTab === 'storico') {
                const today = new Date();
                const year = today.getFullYear();
                const month = today.getMonth();
                
                const firstDayOfMonth = new Date(year, month, 1);
                const lastDayOfMonth = new Date(year, month + 1, 0);
                const daysInMonth = lastDayOfMonth.getDate();
                
                let startDayOfWeek = firstDayOfMonth.getDay();
                if (startDayOfWeek === 0) startDayOfWeek = 7; // ISO Mon=1, Sun=7

                let gridHTML = '';
                // Spazi vuoti per mese precedente
                for (let i = 1; i < startDayOfWeek; i++) {
                    gridHTML += '<div></div>';
                }

                // Generazione giorni reali
                for (let d = 1; d <= daysInMonth; d++) {
                    const dateObj = new Date(year, month, d);
                    const dateStr = getLocalDateString(dateObj);
                    
                    const dayOfWeek = dateObj.getDay() === 0 ? 7 : dateObj.getDay();
                    const dayTasks = state.tasks.filter(t => 
                        t.cadence === 'daily' || (t.cadence === 'weekly' && t.selectedDays.includes(dayOfWeek))
                    );

                    const status = getDayStatus(dateStr, dayTasks);
                    const meta = state.history[dateStr];

                    let borderStyle = 'border-color: var(--uncompleted); border-width: 1px;';
                    let bgStyle = 'text-slate-600';
                    let labelMood = meta?.mood ? `<span class="absolute -bottom-1.5 text-[8px]">${meta.mood}</span>` : '';

                    if (status === 'completed') {
                        borderStyle = 'border-color: var(--completed); border-width: 2.5px;';
                        bgStyle = 'font-bold text-slate-900';
                    } else if (status === 'partial') {
                        borderStyle = 'border-color: var(--partial); border-width: 2.5px;';
                        bgStyle = 'font-bold text-slate-900';
                    } else if (status === 'freeze') {
                        borderStyle = 'border-color: var(--freeze); border-width: 2.5px; background-color: rgba(56, 189, 248, 0.1);';
                        bgStyle = 'font-bold text-sky-700';
                    }

                    gridHTML += `
                        <button onclick="showDayDetail('${dateStr}')" class="aspect-square flex flex-col items-center justify-center relative rounded-full hover:bg-slate-50 active:scale-95 mx-auto w-10 h-10 transition-all" style="${borderStyle}">
                            <span class="text-sm ${bgStyle}">${d}</span>
                            ${labelMood}
                        </button>
                    `;
                }

                // Modale Dettagli giorno se selezionato
                let detailHTML = '';
                if (state.selectedHistoryDay) {
                    const day = state.selectedHistoryDay;
                    const dateObj = new Date(day.dateStr);
                    const readableDate = dateObj.toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long' });
                    
                    let taskListHTML = '';
                    if (day.dayTasks.length === 0) {
                        taskListHTML = '<p class="text-xs text-slate-400 italic">Nessun task programmato per questo giorno.</p>';
                    } else {
                        day.dayTasks.forEach(task => {
                            const val = day.metadata?.completions?.[task.id] || 0;
                            const isDone = val > 0;
                            taskListHTML += `
                                <div class="flex items-center justify-between text-sm p-2.5 rounded-xl bg-slate-50 border border-slate-100">
                                    <span class="font-bold text-slate-700">${task.name}</span>
                                    <div class="flex items-center gap-2">
                                        <span class="text-xs font-semibold text-slate-400">${task.type === 'binary' ? (isDone ? 'Sì' : 'No') : `${val}%`}</span>
                                        <div class="w-5 h-5 rounded-full flex items-center justify-center text-white ${isDone ? 'bg-emerald-500' : 'bg-slate-200'}">
                                            <i data-lucide="${isDone ? 'check' : 'x'}" class="w-3.5 h-3.5"></i>
                                        </div>
                                    </div>
                                </div>
                            `;
                        });
                    }

                    detailHTML = `
                        <div class="rounded-2xl p-5 shadow-sm border border-slate-100 space-y-4 bg-white animate-fadeIn">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h3 class="font-black text-slate-800 text-lg">Resoconto Giornaliero</h3>
                                    <p class="text-xs text-slate-400 font-bold uppercase">${readableDate}</p>
                                </div>
                                <button onclick="state.selectedHistoryDay = null; render();" class="text-slate-400 hover:text-slate-600 p-1">
                                    <i data-lucide="x" class="w-5 h-5"></i>
                                </button>
                            </div>

                            <div class="bg-slate-50 p-4 rounded-xl space-y-3">
                                <div class="flex items-center gap-2">
                                    <span class="text-xs font-bold uppercase text-slate-400">Stato Umore:</span>
                                    <span class="text-2xl">${day.metadata?.mood || 'Nessuno'}</span>
                                </div>
                                <div class="border-t border-slate-200/60 pt-2">
                                    <span class="text-[10px] font-bold uppercase text-slate-400 block mb-1">Post-it scritto:</span>
                                    <p class="text-sm italic text-slate-700 bg-amber-50/50 p-3 rounded-lg border border-dashed border-slate-200">
                                        ${day.metadata?.note || 'Nessuna nota scritta.'}
                                    </p>
                                </div>
                            </div>

                            <div class="space-y-2">
                                <h4 class="text-[10px] font-extrabold text-slate-400 uppercase tracking-wider">Abitudini Verificate</h4>
                                ${taskListHTML}
                            </div>
                        </div>
                    `;
                }

                container.innerHTML = `
                    <div class="space-y-6">
                        <div class="rounded-2xl p-5 shadow-sm border border-slate-100 bg-white">
                            <h2 class="text-base font-extrabold mb-4 text-center tracking-wider text-slate-500 uppercase">
                                ${today.toLocaleDateString('it-IT', { month: 'long', year: 'numeric' })}
                            </h2>

                            <!-- Intestazione giorni -->
                            <div class="grid grid-cols-7 text-center text-xs font-black text-slate-300 mb-4">
                                <div>L</div><div>M</div><div>M</div><div>G</div><div>V</div><div>S</div><div>D</div>
                            </div>

                            <!-- Griglia -->
                            <div class="grid grid-cols-7 gap-y-4 gap-x-1">
                                ${gridHTML}
                            </div>
                        </div>

                        <!-- Legenda -->
                        <div class="flex justify-around items-center text-[10px] font-extrabold uppercase tracking-wide text-slate-400 bg-white p-3 rounded-xl border border-slate-100">
                            <div class="flex items-center gap-1.5">
                                <div class="w-3 h-3 rounded-full border-[2.5px]" style="border-color: var(--completed)"></div>
                                <span>Fatto</span>
                            </div>
                            <div class="flex items-center gap-1.5">
                                <div class="w-3 h-3 rounded-full border-[2.5px]" style="border-color: var(--partial)"></div>
                                <span>Parziale</span>
                            </div>
                            <div class="flex items-center gap-1.5">
                                <div class="w-3 h-3 rounded-full border-[2.5px] bg-sky-50" style="border-color: var(--freeze)"></div>
                                <span>Freeze</span>
                            </div>
                        </div>

                        <!-- Spazio per Modale Dettagli -->
                        ${detailHTML}
                    </div>
                `;
            }

            else if (state.currentTab === 'goals') {
                const daysOfWeekLetters = ['L', 'M', 'M', 'G', 'V', 'S', 'D'];
                
                let daysSelectionHTML = '';
                if (state.newGoal.cadence === 'weekly') {
                    daysSelectionHTML = `
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase">Seleziona i giorni di attività</label>
                            <div class="flex justify-between gap-1">
                                ${daysOfWeekLetters.map((dName, idx) => {
                                    const dNum = idx + 1;
                                    const isSel = state.newGoal.selectedDays.includes(dNum);
                                    return `
                                        <button onclick="toggleGoalDay(${dNum})" type="button" 
                                            class="w-10 h-10 rounded-full text-xs font-black transition-all ${isSel ? 'bg-indigo-600 text-white shadow-md' : 'bg-slate-100 text-slate-400'}">
                                            ${dName}
                                        </button>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    `;
                }

                let activeGoalsListHTML = '';
                if (state.tasks.length === 0) {
                    activeGoalsListHTML = '<p class="text-xs text-slate-400 italic">Non hai ancora creato nessun goal.</p>';
                } else {
                    state.tasks.forEach(task => {
                        const freqLabel = task.cadence === 'daily' ? 'Ogni giorno' : `Specifico: ${task.selectedDays.map(d => ['Lun', 'Mar', 'Mer', 'Gio', 'Ven', 'Sab', 'Dom'][d-1]).join(', ')}`;
                        activeGoalsListHTML += `
                            <div class="p-4 rounded-xl shadow-sm border border-slate-100 bg-white flex items-center justify-between">
                                <div>
                                    <h4 class="font-bold text-sm text-slate-800">${task.name}</h4>
                                    <p class="text-[10px] text-slate-400 font-bold uppercase mt-0.5">${freqLabel}</p>
                                </div>
                                <button onclick="deleteGoal('${task.id}')" class="p-2 text-rose-500 hover:bg-rose-50 rounded-lg transition-all">
                                    <i data-lucide="trash-2" class="w-5 h-5"></i>
                                </button>
                            </div>
                        `;
                    });
                }

                container.innerHTML = `
                    <div class="space-y-6">
                        <!-- Form di creazione -->
                        <div class="rounded-2xl p-5 shadow-sm border border-slate-100 space-y-4 bg-white">
                            <h2 class="text-lg font-black text-slate-800 tracking-tight">Crea un nuovo Goal</h2>
                            
                            <!-- Input Nome -->
                            <div class="space-y-1">
                                <label class="text-xs font-bold text-slate-500 uppercase">Nome abitudine</label>
                                <input id="goal-name-input" type="text" placeholder="Es. Bere 2L d'acqua, Meditazione..." 
                                    value="${state.newGoal.name}" oninput="state.newGoal.name = this.value"
                                    class="w-full p-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 text-sm font-semibold" />
                            </div>

                            <!-- Selezione Tipologia -->
                            <div class="space-y-1">
                                <label class="text-xs font-bold text-slate-500 uppercase">Tipologia di risposta</label>
                                <div class="grid grid-cols-2 gap-2">
                                    <button onclick="setGoalField('type', 'binary')" class="p-3 rounded-xl text-xs font-bold border transition-all ${state.newGoal.type === 'binary' ? 'border-indigo-500 bg-indigo-50/50 text-indigo-700' : 'border-slate-200 hover:bg-slate-50 text-slate-500'}">
                                        Sì / No
                                    </button>
                                    <button onclick="setGoalField('type', 'progressive')" class="p-3 rounded-xl text-xs font-bold border transition-all ${state.newGoal.type === 'progressive' ? 'border-indigo-500 bg-indigo-50/50 text-indigo-700' : 'border-slate-200 hover:bg-slate-50 text-slate-500'}">
                                        Progressivo (%)
                                    </button>
                                </div>
                            </div>

                            <!-- Selezione Frequenza -->
                            <div class="space-y-1">
                                <label class="text-xs font-bold text-slate-500 uppercase">Frequenza</label>
                                <div class="grid grid-cols-2 gap-2">
                                    <button onclick="setGoalField('cadence', 'daily')" class="p-3 rounded-xl text-xs font-bold border transition-all ${state.newGoal.cadence === 'daily' ? 'border-indigo-500 bg-indigo-50/50 text-indigo-700' : 'border-slate-200 hover:bg-slate-50 text-slate-500'}">
                                        Ogni giorno
                                    </button>
                                    <button onclick="setGoalField('cadence', 'weekly')" class="p-3 rounded-xl text-xs font-bold border transition-all ${state.newGoal.cadence === 'weekly' ? 'border-indigo-500 bg-indigo-50/50 text-indigo-700' : 'border-slate-200 hover:bg-slate-50 text-slate-500'}">
                                        Giorni specifici
                                    </button>
                                </div>
                            </div>

                            <!-- Mostra giorni se settimanale -->
                            ${daysSelectionHTML}

                            <button onclick="createGoal()" class="w-full py-3.5 bg-primary text-white font-bold rounded-xl active:scale-[0.98] transition-all text-sm shadow-md mt-2">
                                Salva Goal
                            </button>
                        </div>

                        <!-- Elenco Goals attivi -->
                        <div class="space-y-3">
                            <h3 class="text-base font-black text-slate-800 uppercase tracking-wide">I miei goal attivi</h3>
                            <div class="space-y-2">
                                ${activeGoalsListHTML}
                            </div>
                        </div>
                    </div>
                `;
            }

            // Ricrea le icone Lucide dopo ogni rendering
            if (window.lucide) {
                window.lucide.createIcons();
            }
        }

        // --- AVVIO APPLICAZIONE ---
        window.onload = function() {
            loadState();
            changeTab('oggi'); // Carica tab iniziale
        };
    </script>

</body></html>
